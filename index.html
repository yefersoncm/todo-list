<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
    <!-- Fallback que se carga antes de los CDN. Si Bootstrap responde, lo sobreescribe. -->
    <link rel="stylesheet" href="vendor/fallback.css" />
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-eOJMYsd53ii+scO/bJGFsiCZc+5NDVN2yr8+0RDqr0Ql0h+rP48ckxlpbzKgwra6"
        crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <section class="section-center">
        <form class="grocery-form">
            <p class="alert1"></p>
            <h3>Todo List</h3>
            <div class="form-control1">
                <input type="text" id="grocery" placeholder="ejemplo: Ir al Gym">
                <button type="submit" class="submit-btn">
                    <span class="submit-icon" aria-hidden="true"></span>
                    <span class="submit-label">Agregar</span>
                </button>
            </div>
        </form>

        <div class="grocery-container">
            <p class="task-count"></p> <div class="grocery-list">
                </div>
            <button type="button" class="clear-btn">Limpiar lista</button>
        </div>

        <div class="filters-container">
            <span id="filterLabel" class="filter-label">Mostrar</span>
            <div class="combo" id="taskFilter">
                <button
                    type="button"
                    class="combo-toggle"
                    aria-haspopup="listbox"
                    aria-expanded="false"
                    aria-labelledby="filterLabel"
                >
                    <span class="combo-toggle-label">Todas</span>
                    <span class="combo-arrow" aria-hidden="true">▾</span>
                </button>
                <ul
                    class="combo-listbox"
                    role="listbox"
                    tabindex="-1"
                    aria-labelledby="filterLabel"
                    hidden
                >
                    <li role="option" data-value="all" aria-selected="true" id="opt-all">Todas</li>
                    <li role="option" data-value="done" aria-selected="false" id="opt-done">Hechas</li>
                    <li role="option" data-value="pending" aria-selected="false" id="opt-pending">Pendientes</li>
                </ul>
            </div>
        </div>
    </section>

    <div class="confirm-modal" id="confirmModal" hidden>
        <div class="confirm-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="confirmModalText">
            <p class="confirm-modal-text" id="confirmModalText"></p>
            <div class="confirm-modal-actions">
                <button type="button" class="confirm-btn confirm-btn-cancel" data-action="cancel">Cancelar</button>
                <button type="button" class="confirm-btn confirm-btn-ok" data-action="ok">Aceptar</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.1/dist/umd/popper.min.js" integrity="sha384-SR1sx49pcuLnqZUnnPwx6FCym0wLsk5JZuNx2bPPENzswTNFaQU1RDvt3wT4gWFG" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
